<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo-area">
    <h1>My <span>Watchlist</span></h1>
    <p>TRACK · RATE · DISCOVER</p>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search titles..." oninput="render()">
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all" onclick="setFilter(this,'all')">All</button>
    <button class="filter-tab" data-filter="want" onclick="setFilter(this,'want')">Want</button>
    <button class="filter-tab" data-filter="watching" onclick="setFilter(this,'watching')">Watching</button>
    <button class="filter-tab" data-filter="watched" onclick="setFilter(this,'watched')">Watched</button>
    <button class="filter-tab" data-filter="dropped" onclick="setFilter(this,'dropped')">Dropped</button>
  </div>
  <div class="type-filter">
    <button class="type-btn active" data-type="all" onclick="setType(this,'all')">All</button>
    <button class="type-btn" data-type="movie" onclick="setType(this,'movie')">🎬</button>
    <button class="type-btn" data-type="show" onclick="setType(this,'show')">📺</button>
  </div>
  <select class="sort-select" id="sortSelect" onchange="render()">
    <option value="added">Recent</option>
    <option value="title">A–Z</option>
    <option value="rating">Rating</option>
    <option value="year">Year</option>
  </select>
  <button class="add-btn" onclick="openModal()">＋ Add</button>
</div>

<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Add to Watchlist</h2>
    <div class="form-row">
      <label>Title *</label>
      <input type="text" id="fTitle" placeholder="e.g. Inception">
    </div>
    <div class="form-row-grid">
      <div class="form-row" style="margin:0">
        <label>Type</label>
        <select id="fType">
          <option value="movie">🎬 Movie</option>
          <option value="show">📺 TV Show</option>
        </select>
      </div>
      <div class="form-row" style="margin:0">
        <label>Year</label>
        <input type="number" id="fYear" placeholder="2024" min="1900" max="2030">
      </div>
    </div>
    <div class="form-row-grid">
      <div class="form-row" style="margin:0">
        <label>Status</label>
        <select id="fStatus">
          <option value="want">Want to Watch</option>
          <option value="watching">Watching</option>
          <option value="watched">Watched</option>
          <option value="dropped">Dropped</option>
        </select>
      </div>
      <div class="form-row" style="margin:0">
        <label>Genre</label>
        <select id="fGenre">
          <option value="">—</option>
          <option>Action</option>
          <option>Comedy</option>
          <option>Drama</option>
          <option>Horror</option>
          <option>Sci-Fi</option>
          <option>Thriller</option>
          <option>Romance</option>
          <option>Animation</option>
          <option>Documentary</option>
          <option>Fantasy</option>
          <option>Crime</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="addItem()">Add to List</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/render.js"></script>
<script src="js/modal.js"></script>
<script src="js/app.js"></script>
</body>
</html>
